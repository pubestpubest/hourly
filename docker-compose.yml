services:
  app:
    build: .
    ports:
      - "3000:3000"        # ← only this needs to be public / reverse-proxied
    env_file: .env
    environment:
      TZ: Asia/Bangkok
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    # No ports exposed — internal network only
    environment:
      POSTGRES_DB: hourly
      POSTGRES_USER: hourly
      POSTGRES_PASSWORD: hourly
      TZ: Asia/Bangkok
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hourly"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    # No ports exposed — app accesses MinIO over internal network only.
    # To access the MinIO console during local dev, temporarily add:
    #   ports:
    #     - "9000:9000"
    #     - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      TZ: Asia/Bangkok
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb local/hourly-photos --ignore-existing &&
        echo 'MinIO bucket ready'
      "

volumes:
  postgres_data:
  minio_data:
